<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <title>범예지 해커톤 미니게임 - 목록</title>
  <style>
    :root {
      --gray-0: rgba(250, 250, 250, 1);
      --gray-100: rgba(250, 250, 250, 1);
      --gray-200: rgba(241, 241, 241, 1);
      --gray-300: rgba(211, 211, 211, 1);
      --gray-500: rgba(114, 114, 114, 1);
      --gray-600: rgba(76, 80, 84, 1);
      --gray-700: rgba(28, 28, 28, 1);

      --primary-0: rgba(254, 245, 242, 1);
      --primary-100: rgba(253, 222, 213, 1);
      --primary-300: rgba(249, 156, 129, 1);
      --primary-500: rgba(245, 90, 45, 1);
      --primary-600: rgba(136, 59, 37, 1);

      --secondary-100: rgba(205, 237, 219, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--gray-700);
      font-family: "Pretendard Variable", "Pretendard", "SUIT", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    header{
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      min-width: 360px;
      max-width: 740px;
      margin: 0 auto;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #fff;
      h1{
        text-align: center;
        font-size: 24px;
      }
      a{
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        left: 20px;
        text-decoration: none;
        color: inherit;
        font-size: 24px;
      }

      img{
        width: 100%;
      }
    }

    .container {
      background: var(--primary-0);
      width: 100%;
      min-width: 360px;
      max-width: 740px;
      margin: 0 auto;
      padding: 80px 16px 56px;
    }

    .header {
      /* background: var(--gray-100);
      border: 1px solid var(--gray-300); */
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 14px;
    }

    .chip {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--primary-100);
      color: var(--primary-600);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 36px);
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--gray-600);
      font-size: 15px;
    }

    .list {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .card {
      background: var(--gray-100);
      border: 1px solid var(--gray-300);
      border-radius: 16px;
      padding: 18px;
    }

    .tag {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--primary-600);
      background: var(--primary-100);
    }

    .card:nth-child(2) .tag {
      background: var(--secondary-100);
      color: var(--gray-700);
    }

    .card h2 {
      margin: 0;
      font-size: 21px;
      letter-spacing: -0.01em;
    }

    .card p {
      margin: 8px 0 14px;
      color: var(--gray-600);
      font-size: 14px;
      line-height: 1.5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 11px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      color: var(--gray-0);
      background: var(--primary-500);
      transition: background-color 0.18s ease;
    }

    .btn:hover {
      background: var(--primary-600);
    }

    .back {
      margin-top: 14px;
      text-align: center;
    }

    .back a {
      color: var(--gray-500);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .back a:hover {
      color: var(--gray-700);
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <a href="./index.html"><</a>
      <h1>미니 게임</h1>
    </header>
    <section class="header">
      <span class="chip">TEAM BUMYEJI</span>
      <h1>🕹️ 범예지팀 미니게임</h1>
    </section>

    <section class="list" aria-label="게임 목록">
      <article class="card">
        <h2>고양이토끼 게임</h2>
        <p>고양이! 토끼! 보이는 즉시 터치하면 점수가 쌓인다.</p>
        <a href="../turning/index.html" class="btn">플레이하기</a>
      </article>

      <article class="card">
        <h2>타자게임</h2>
        <p>나는 얼마나 빨리 정확하게 칠 수 있을까?</p>
        <a href="../typing/index.html" class="btn">플레이하기</a>
      </article>

      <article class="card">
        <h2>1 to 50</h2>
        <p>1부터 50까지 60초 안에 찾아라!</p>
        <a href="../counting/index.html" class="btn">플레이하기</a>
      </article>
    </section>

    <div class="back">
      <a href="../index.html">인트로로 돌아가기</a>
    </div>
  </main>
</body>
</html>
