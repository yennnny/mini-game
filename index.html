<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 팀 미니게임 프로젝트</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        h1 { color: #333; margin-bottom: 40px; }
        .game-list { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .game-card { 
            background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            width: 250px; padding: 20px; text-align: center; transition: transform 0.2s;
        }
        .game-card:hover { transform: translateY(-5px); }
        .game-card h2 { font-size: 1.2rem; color: #2d3436; }
        .game-card p { color: #636e72; font-size: 0.9rem; margin: 15px 0; }
        .btn { 
            display: inline-block; background-color: #0984e3; color: white; 
            padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold;
        }
        .btn:hover { background-color: #74b9ff; }
    </style>
</head>
<body>

    <h1>🕹️ Team Mini-Game Project</h1>

    <div class="game-list">
        <div class="game-card">
            <h2>게임 A</h2>
            <p>React로 구현한 역동적인 퍼즐 게임입니다.</p>
            <a href="./game-a/index.html" class="btn">플레이하기</a>
        </div>

        <div class="game-card">
            <h2>게임 B</h2>
            <p>HTML5 Canvas를 이용한 슈팅 게임입니다.</p>
            <a href="./game-b/index.html" class="btn">플레이하기</a>
        </div>

        <div class="game-card">
            <h2>게임 C</h2>
            <p>간단하지만 중독성 있는 아케이드 게임입니다.</p>
            <a href="./game-c/index.html" class="btn">플레이하기</a>
        </div>
    </div>

</body>
</html>
