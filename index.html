<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <title>범예지 해커톤 미니게임</title>
  <style>
    body {
      margin: 0;
      background: #000;
      min-height: 100vh;
      font-family: 'Pretendard', sans-serif;
    }
    .intro {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      cursor: pointer;
    }
    .intro > img {
      display: block;
      width: 100%;
      height: auto;
    }
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      min-width: 360px;
      max-width: 740px;
      margin: 0 auto;
      pointer-events: none;
    }
    .nav img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="intro" id="intro" aria-label="intro screen">
    <img src="./main.jpg" alt="미니게임 인트로">
    <div class="nav">
      <img src="./nav.jpg" alt="시작 안내">
    </div>
  </div>

  <script>
    const intro = document.getElementById('intro');
    if (intro) {
      intro.addEventListener('click', () => {
        window.location.href = './list/';
      });
    }
  </script>
</body>
</html>
